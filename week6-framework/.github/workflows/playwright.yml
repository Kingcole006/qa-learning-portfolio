name: Playwright Tests

on:
  # Run automatically when code is pushed to these branches
  push:
    branches: [ main, master ]
  # Run automatically when a pull request is opened
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    # Use the latest Ubuntu server (free on GitHub)
    runs-on: ubuntu-latest
    
    # Stop the job if it runs longer than 60 minutes
    timeout-minutes: 60

    steps:
      # Step 1: Download your code onto the server
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js on the server
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Step 3: Install your npm packages
      - name: Install dependencies
        run: npm install
        working-directory: week6-framework

      # Step 4: Install Playwright browsers on the server
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: week6-framework

      # Step 5: Run all your tests
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: week6-framework
        env:
          BASE_URL: https://www.saucedemo.com
          TEST_TIMEOUT: 30000

      # Step 6: Upload the HTML report so you can view it on GitHub
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: week6-framework/playwright-report/
          retention-days: 30